name = "sharpalert"
main = "src/worker.ts"
compatibility_date = "2026-01-01"

# Secrets (never commit) - set with:
#   wrangler secret put TXLINE_API_KEY
#   wrangler secret put DEEPINFRA_API_KEY   # for the signal explanations (DeepInfra LLM)
#   wrangler secret put ADMIN_KEY           # gates POST /api/run-now (+ its dashboard button)
# (No Container - a 1-minute cron polls TxLINE odds for live matches.)

[assets]
directory = "./public"
binding = "ASSETS"

# 60-second poll (cron minimum granularity is 1 minute).
[triggers]
crons = ["* * * * *"]

# match_state + odds_snapshots + signals + kv (JWT cache).
[[d1_databases]]
binding = "DB"
database_name = "sharpalert"
database_id = "1bd2b237-9dfa-42f1-8f0b-1c6b0bcdc251"   # run: wrangler d1 create sharpalert
